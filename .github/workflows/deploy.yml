name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.create.outputs.created }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Read version
        id: version
        run: echo "tag=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "created=false" >> $GITHUB_OUTPUT
          else
            gh release create "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.tag }}" \
              --generate-notes \
              --draft
            echo "created=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tauri-build:
    needs: [release]
    if: github.event.workflow_run.conclusion == 'success' && needs.release.outputs.created == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Sync tauri.conf.json version from package.json
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          $cfg = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $cfg.version = $ver
          $cfg | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload installers and publish release
        run: |
          Copy-Item (Get-Item src-tauri/target/release/bundle/nsis/*.exe).FullName Tangle-Setup.exe
          Copy-Item (Get-Item src-tauri/target/release/bundle/msi/*.msi).FullName Tangle-Setup.msi
          gh release upload "${{ needs.release.outputs.tag }}" Tangle-Setup.exe Tangle-Setup.msi
          gh release edit "${{ needs.release.outputs.tag }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pages:
    needs: [release]
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_PAGES: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
