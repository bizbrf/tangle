name: Bug report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I upload a file with circular references, the graph never finishes loading."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open the app
        2. Upload 'my-file.xlsx'
        3. Click the Overview button
        4. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Web app (bizbrf.github.io/tangle)
        - Desktop (Windows installer)
        - Local dev build
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / OS version
      placeholder: "Chrome 124 on Windows 11"

  - type: textarea
    id: extras
    attributes:
      label: Additional context
      description: Screenshots, console errors, or a sample file (no sensitive data please).
